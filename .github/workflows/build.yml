name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # 推送 v 开头的 tag(如 v4.0)自动编译并发布 Release
  workflow_dispatch:   # 也可在 Actions 页面手动触发

permissions:
  contents: write      # 创建 Release 需要写权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          # 调试：列出实际打包产出目录内容
          ls -la app/build/outputs/apk/release/ || echo "Release包输出目录不存在"
          find app/build -name "*.apk" -type f || echo "未检索到任何APK安装包"

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "found APK: $APK"
          cp "$APK" yxt-adfree.apk

      - name: Upload artifact (每次构建可下载)
        uses: actions/upload-artifact@v4
        with:
          name: yxt-adfree-apk
          path: yxt-adfree.apk

      - name: Create Release (仅打 tag 时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: yxt-adfree.apk
          name: ${{ github.ref_name }}
          body: |
            乐校通去广告 LSPosed 模块
            - 移除开屏/插屏/信息流/banner 全部广告
            - 拦截日志(类型/广告位/联盟/域名)、自动清理、导出 txt
            - 莫奈动态主题、隐藏图标、可从 LSPosed 打开
            Powered by zzdwymk
